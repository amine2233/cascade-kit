name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_EXPERIMENTAL: 'true'

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise (cached)
        uses: jdx/mise-action@v2
        with:
          experimental: true
          cache: true
          cache_key_prefix: mise-${{ matrix.os }}

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: mise run test